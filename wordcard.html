<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>호연이 한글 맞추기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fef9f0;
            --warm-brown: #8b7355;
            --soft-green: #a8d5a2;
            --sky-blue: #87ceeb;
            --soft-pink: #f4c2c2;
            --soft-yellow: #fff4b8;
            --card-shadow: 0 4px 20px rgba(139, 115, 85, 0.15);
            --card-radius: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { 
            font-size: 16px; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Gowun Batang', 'Malgun Gothic', serif;
            background: linear-gradient(165deg, #e8f4e8 0%, #fff9e8 50%, #f0e8f4 100%);
            color: var(--warm-brown);
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            max-width: 393px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            padding: 12px 0 16px;
        }
        .header h1 {
            font-family: 'Jua', sans-serif;
            font-size: 1.25rem;
            color: var(--warm-brown);
            font-weight: 400;
        }
        .cards-grid {
            flex: 1;
            min-height: 200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 12px;
            align-content: start;
            padding-bottom: 16px;
        }
        .card {
            aspect-ratio: 1;
            min-height: 80px;
            perspective: 800px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--card-radius);
            overflow: hidden;
        }
        .card-front {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 3px solid rgba(139, 115, 85, 0.15);
        }
        .card-front svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-width: 100px;
            max-height: 100px;
        }
        .card-back {
            background: linear-gradient(145deg, #fff 0%, var(--soft-yellow) 100%);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(139, 115, 85, 0.2);
        }
        .card-word {
            font-family: 'Jua', sans-serif;
            font-size: clamp(2rem, 8vw, 2.75rem);
            color: var(--warm-brown);
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.06);
        }
        .nav-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 0;
            flex-wrap: wrap;
        }
        .nav-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .nav-btn {
            font-family: 'Jua', sans-serif;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            background: var(--cream);
            color: var(--warm-brown);
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(139, 115, 85, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .page-indicator {
            font-family: 'Jua', sans-serif;
            font-size: 1.1rem;
            color: var(--warm-brown);
            min-width: 70px;
            text-align: center;
            background: rgba(255,255,255,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 1px 8px rgba(139, 115, 85, 0.15);
        }
        .page-indicator .current { font-weight: 700; color: #6b5344; }
        @media (min-width: 394px) {
            body { background: linear-gradient(165deg, #e8f4e8 0%, #fff9e8 50%, #f0e8f4 100%); }
            .container { padding: 24px; }
        }
    </style>
</head>

        <nav class="nav-area">
            <button class="nav-btn" id="prevSet" aria-label="이전 페이지">← 이전</button>
            <span class="page-indicator" id="pageIndicator"><span class="current">1</span> / 10</span>
            <button class="nav-btn" id="nextSet" aria-label="다음 페이지">다음 →</button>
        </nav>
    </div>

        const CARDS_PER_PAGE = 6;

                { word: '귤', svg: tangerineSvg }, { word: '감', svg: persimmonSvg }, { word: '호박', svg: pumpkinSvg }
            ],
            [
                { word: '감자', svg: potatoSvg }, { word: '돌고래', svg: dolphinSvg }, { word: '곰', svg: bearSvg },
                { word: '원숭이', svg: monkeySvg }, { word: '거미', svg: spiderSvg }, { word: '벌', svg: beeSvg }
            ],
            [
                { word: '얼굴', svg: faceSvg }, { word: '손', svg: handSvg }, { word: '배', svg: boatSvg },
                { word: '강아지', svg: dogSvg }, { word: '햇님', svg: sunSvg }, { word: '병아리', svg: birdSvg }
            ],
            [
                { word: '장미', svg: flowerSvg }, { word: '기차', svg: carSvg }, { word: '오리', svg: birdSvg },
                { word: '닭', svg: birdSvg }, { word: '밤', svg: moonSvg }, { word: '자동차', svg: carSvg }
            ]
        ];

        let currentSet = 0;

        function makeSvgUnique(svgStr, prefix) {
            if (!svgStr || typeof svgStr !== 'string') return '';
            return svgStr.replace(/\bid="([^"]+)"/g, (_, id) => `id="${id}-${prefix}"`)
                .replace(/url\(#([^)]+)\)/g, (_, id) => `url(#${id}-${prefix})`);
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            if (!grid) return;
            const set = WORD_SETS[currentSet];
            grid.innerHTML = set.map((item, i) => {
                const svgHtml = typeof item.svg === 'function' ? item.svg() : '';
                const uniqueSvg = makeSvgUnique(svgHtml, 'c' + i);
                return `
                <div class="card" data-index="${i}" role="button" tabindex="0">
                    <div class="card-inner">
                        <div class="card-face card-front">${uniqueSvg}</div>
                        <div class="card-face card-back">
                            <span class="card-word">${item.word}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');

            grid.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    card.classList.toggle('flipped');
                });
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.classList.toggle('flipped');
                    }
                });
            });

            const indicator = document.getElementById('pageIndicator');
            if (indicator) {
                indicator.innerHTML = `<span class="current">${currentSet + 1}</span> / ${TOTAL_PAGES}`;
            }
        }

        function init() {
            try {
                const prevBtn = document.getElementById('prevSet');
                const nextBtn = document.getElementById('nextSet');
                if (prevBtn) {
                    prevBtn.onclick = function() {
                        currentSet = (currentSet - 1 + TOTAL_PAGES) % TOTAL_PAGES;
                        document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('flipped'); });
                        renderCards();
                    };
                }
                if (nextBtn) {
                    nextBtn.onclick = function() {
                        currentSet = (currentSet + 1) % TOTAL_PAGES;
                        document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('flipped'); });
                        renderCards();
                    };
                }
                renderCards();
            } catch (err) {
                var grid = document.getElementById('cardsGrid');
                if (grid) grid.innerHTML = '<p style="padding:20px;color:#c00;">오류: ' + String(err.message) + '</p>';
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
