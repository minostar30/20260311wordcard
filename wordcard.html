<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>한글 단어카드 - 우리 아이 첫 한글</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fef9f0;
            --warm-brown: #8b7355;
            --soft-green: #a8d5a2;
            --sky-blue: #87ceeb;
            --soft-pink: #f4c2c2;
            --soft-yellow: #fff4b8;
            --card-shadow: 0 4px 20px rgba(139, 115, 85, 0.15);
            --card-radius: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { 
            font-size: 16px; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100dvh;
            font-family: 'Gowun Batang', 'Malgun Gothic', serif;
            background: linear-gradient(165deg, #e8f4e8 0%, #fff9e8 50%, #f0e8f4 100%);
            color: var(--warm-brown);
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            max-width: 390px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            padding: 12px 0 16px;
        }
        .header h1 {
            font-family: 'Jua', sans-serif;
            font-size: 1.25rem;
            color: var(--warm-brown);
            font-weight: 400;
        }
        .cards-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            align-content: start;
            padding-bottom: 20px;
        }
        .card {
            aspect-ratio: 1;
            perspective: 800px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--card-radius);
            overflow: hidden;
        }
        .card-front {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 3px solid rgba(139, 115, 85, 0.15);
        }
        .card-front svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-width: 140px;
            max-height: 140px;
        }
        .card-back {
            background: linear-gradient(145deg, #fff 0%, var(--soft-yellow) 100%);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(139, 115, 85, 0.2);
        }
        .card-word {
            font-family: 'Jua', sans-serif;
            font-size: clamp(2rem, 8vw, 2.75rem);
            color: var(--warm-brown);
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.06);
        }
        .nav-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 12px 0;
        }
        .nav-btn {
            font-family: 'Jua', sans-serif;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            background: var(--cream);
            color: var(--warm-brown);
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(139, 115, 85, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        @media (min-width: 391px) {
            body { background: linear-gradient(165deg, #e8f4e8 0%, #fff9e8 50%, #f0e8f4 100%); }
            .container { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍃 한글 단어카드</h1>
        </header>
        <main class="cards-grid" id="cardsGrid"></main>
        <nav class="nav-btns">
            <button class="nav-btn" id="prevSet" aria-label="이전 단어 세트">← 이전</button>
            <button class="nav-btn" id="nextSet" aria-label="다음 단어 세트">다음 →</button>
        </nav>
    </div>
    <script>
        const WORD_SETS = [
            [
                { word: '개', svg: dogSvg },
                { word: '고양이', svg: catSvg },
                { word: '해', svg: sunSvg },
                { word: '나무', svg: treeSvg }
            ],
            [
                { word: '물', svg: waterSvg },
                { word: '빵', svg: breadSvg },
                { word: '사과', svg: appleSvg },
                { word: '차', svg: carSvg }
            ],
            [
                { word: '달', svg: moonSvg },
                { word: '꽃', svg: flowerSvg },
                { word: '별', svg: starSvg },
                { word: '바다', svg: seaSvg }
            ]
        ];

        function dogSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="dogGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8d4b8"/><stop offset="100%" stop-color="#d4b896"/></linearGradient></defs>
                <ellipse cx="60" cy="75" rx="35" ry="25" fill="url(#dogGrad)"/>
                <circle cx="60" cy="45" r="22" fill="url(#dogGrad)"/>
                <ellipse cx="48" cy="38" rx="4" ry="5" fill="#5a4a3a"/>
                <ellipse cx="72" cy="38" rx="4" ry="5" fill="#5a4a3a"/>
                <path d="M55 50 Q60 58 65 50" stroke="#5a4a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
                <ellipse cx="38" cy="55" rx="8" ry="5" fill="url(#dogGrad)"/>
            </svg>`;
        }
        function catSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f4c2a2"/><stop offset="100%" stop-color="#e8a87c"/></linearGradient></defs>
                <ellipse cx="60" cy="72" rx="32" ry="22" fill="url(#catGrad)"/>
                <circle cx="60" cy="42" r="20" fill="url(#catGrad)"/>
                <path d="M45 32 L50 20 L55 32 M75 32 L70 20 L65 32" stroke="#c4956a" stroke-width="3" fill="none" stroke-linecap="round"/>
                <ellipse cx="50" cy="40" rx="2" ry="3" fill="#2d2d2d"/>
                <ellipse cx="70" cy="40" rx="2" ry="3" fill="#2d2d2d"/>
                <path d="M55 48 Q60 54 65 48" stroke="#2d2d2d" stroke-width="1.5" fill="none"/>
            </svg>`;
        }
        function sunSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff9c4"/><stop offset="100%" stop-color="#ffeb3b"/></linearGradient><radialGradient id="sunGlow"><stop offset="0%" stop-color="#fffde7"/><stop offset="100%" stop-color="#ffeb3b"/></radialGradient></defs>
                <circle cx="60" cy="60" r="28" fill="url(#sunGlow)"/>
                <path d="M60 20 L62 32 L60 35 L58 32 Z M60 85 L62 97 L60 100 L58 97 Z M20 60 L32 62 L35 60 L32 58 Z M85 60 L97 62 L100 60 L97 58 Z" fill="url(#sunGrad)"/>
                <path d="M35 35 L43 43 L41 46 L33 38 Z M85 35 L77 43 L74 41 L82 33 Z M35 85 L43 77 L46 79 L38 87 Z M85 85 L77 77 L74 79 L82 87 Z" fill="url(#sunGrad)"/>
            </svg>`;
        }
        function treeSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="trunkGrad" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#8d6e63"/><stop offset="100%" stop-color="#a1887f"/></linearGradient><linearGradient id="leafGrad" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#81c784"/><stop offset="100%" stop-color="#a5d6a7"/></linearGradient></defs>
                <rect x="52" y="75" width="16" height="35" rx="3" fill="url(#trunkGrad)"/>
                <ellipse cx="60" cy="55" rx="35" ry="28" fill="url(#leafGrad)"/>
                <ellipse cx="60" cy="45" rx="28" ry="22" fill="url(#leafGrad)"/>
                <ellipse cx="60" cy="35" rx="20" ry="16" fill="url(#leafGrad)"/>
            </svg>`;
        }
        function waterSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#90caf9"/><stop offset="100%" stop-color="#42a5f5"/></linearGradient></defs>
                <ellipse cx="60" cy="75" rx="45" ry="20" fill="url(#waterGrad)" opacity="0.9"/>
                <path d="M20 85 Q35 80 50 85 Q65 90 80 85 Q95 80 110 85" stroke="#64b5f6" stroke-width="3" fill="none" opacity="0.8"/>
                <path d="M25 95 Q45 90 65 95 Q85 100 100 95" stroke="#42a5f5" stroke-width="2" fill="none" opacity="0.6"/>
                <circle cx="50" cy="55" r="12" fill="#bbdefb" opacity="0.7"/>
                <circle cx="75" cy="50" r="8" fill="#e3f2fd" opacity="0.8"/>
            </svg>`;
        }
        function breadSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="breadGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffecb3"/><stop offset="50%" stop-color="#ffd54f"/><stop offset="100%" stop-color="#ffb300"/></linearGradient></defs>
                <ellipse cx="60" cy="65" rx="40" ry="25" fill="url(#breadGrad)"/>
                <path d="M25 60 Q35 50 45 58 Q55 65 60 62 Q70 58 85 65 Q95 70 95 72 L25 72 Z" fill="#ff8f00" opacity="0.3"/>
                <ellipse cx="45" cy="55" rx="4" ry="3" fill="#e65100" opacity="0.5"/>
                <ellipse cx="70" cy="60" rx="4" ry="3" fill="#e65100" opacity="0.5"/>
            </svg>`;
        }
        function appleSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#c62828"/></linearGradient><linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#66bb6a"/><stop offset="100%" stop-color="#81c784"/></linearGradient></defs>
                <path d="M60 25 C35 25 25 50 30 75 C35 95 50 100 60 100 C70 100 85 95 90 75 C95 50 85 25 60 25 Z" fill="url(#appleGrad)"/>
                <path d="M60 15 L60 25 L65 20 Z" fill="#8d6e63"/>
                <path d="M58 18 Q60 5 68 18" stroke="url(#leafGrad2)" stroke-width="4" fill="none" stroke-linecap="round"/>
                <ellipse cx="45" cy="60" rx="5" ry="4" fill="#ff8a80" opacity="0.5"/>
            </svg>`;
        }
        function carSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="carGrad" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#90caf9"/><stop offset="100%" stop-color="#42a5f5"/></linearGradient></defs>
                <rect x="25" y="55" width="70" height="25" rx="5" fill="url(#carGrad)"/>
                <path d="M35 55 L45 40 L75 40 L85 55 Z" fill="url(#carGrad)"/>
                <rect x="40" y="45" width="25" height="12" rx="2" fill="#b3e5fc"/>
                <rect x="55" y="45" width="25" height="12" rx="2" fill="#b3e5fc"/>
                <circle cx="40" cy="82" r="8" fill="#37474f"/>
                <circle cx="80" cy="82" r="8" fill="#37474f"/>
            </svg>`;
        }
        function moonSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><radialGradient id="moonGrad"><stop offset="0%" stop-color="#fffde7"/><stop offset="70%" stop-color="#fff9c4"/><stop offset="100%" stop-color="#f5f5f5"/></radialGradient></defs>
                <circle cx="60" cy="60" r="32" fill="url(#moonGrad)"/>
                <circle cx="72" cy="48" r="8" fill="#e8f4e8" opacity="0.6"/>
                <circle cx="55" cy="68" r="5" fill="#e8f4e8" opacity="0.5"/>
                <circle cx="48" cy="50" r="4" fill="#e8f4e8" opacity="0.4"/>
            </svg>`;
        }
        function flowerSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffcdd2"/><stop offset="100%" stop-color="#f48fb1"/></linearGradient></defs>
                <ellipse cx="60" cy="45" rx="12" ry="18" fill="url(#petalGrad)" transform="rotate(0 60 60)"/>
                <ellipse cx="60" cy="45" rx="12" ry="18" fill="url(#petalGrad)" transform="rotate(72 60 60)"/>
                <ellipse cx="60" cy="45" rx="12" ry="18" fill="url(#petalGrad)" transform="rotate(144 60 60)"/>
                <ellipse cx="60" cy="45" rx="12" ry="18" fill="url(#petalGrad)" transform="rotate(216 60 60)"/>
                <ellipse cx="60" cy="45" rx="12" ry="18" fill="url(#petalGrad)" transform="rotate(288 60 60)"/>
                <circle cx="60" cy="60" r="12" fill="#ffeb3b"/>
                <rect x="57" y="65" width="6" height="35" rx="2" fill="#81c784"/>
            </svg>`;
        }
        function starSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fff9c4"/><stop offset="100%" stop-color="#ffe082"/></linearGradient></defs>
                <path d="M60 15 L68 48 L102 48 L75 68 L85 100 L60 82 L35 100 L45 68 L18 48 L52 48 Z" fill="url(#starGrad)"/>
            </svg>`;
        }
        function seaSvg() {
            return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4dd0e1"/><stop offset="100%" stop-color="#0097a7"/></linearGradient></defs>
                <rect x="0" y="40" width="120" height="80" fill="url(#seaGrad)"/>
                <path d="M0 55 Q30 50 60 55 Q90 60 120 55" stroke="#80deea" stroke-width="4" fill="none" opacity="0.8"/>
                <path d="M0 75 Q30 70 60 75 Q90 80 120 75" stroke="#4dd0e1" stroke-width="3" fill="none" opacity="0.6"/>
                <ellipse cx="30" cy="35" rx="20" ry="8" fill="#fff" opacity="0.9"/>
                <ellipse cx="90" cy="28" rx="15" ry="6" fill="#fff" opacity="0.8"/>
            </svg>`;
        }

        let currentSet = 0;

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const set = WORD_SETS[currentSet];
            grid.innerHTML = set.map((item, i) => `
                <div class="card" data-index="${i}" role="button" tabindex="0">
                    <div class="card-inner">
                        <div class="card-face card-front">
                            ${typeof item.svg === 'function' ? item.svg() : ''}
                        </div>
                        <div class="card-face card-back">
                            <span class="card-word">${item.word}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            grid.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    card.classList.toggle('flipped');
                });
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.classList.toggle('flipped');
                    }
                });
            });
        }

        document.getElementById('prevSet').addEventListener('click', () => {
            currentSet = (currentSet - 1 + WORD_SETS.length) % WORD_SETS.length;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
            renderCards();
        });

        document.getElementById('nextSet').addEventListener('click', () => {
            currentSet = (currentSet + 1) % WORD_SETS.length;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
            renderCards();
        });

        renderCards();
    </script>
</body>
</html>
